services:
  - type: web
    name: peggy-sophie-linebot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_TASKS_DB_ID
        sync: false
      - key: LINE_USER_ID
        sync: false
      - key: EVA_LINE_CHANNEL_SECRET
        sync: false
      - key: EVA_LINE_CHANNEL_ACCESS_TOKEN
        sync: false
